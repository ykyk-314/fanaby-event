<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background: orange -->
    <rect width="100" height="100" fill="#EA580C"/>

    <!-- Calendar: top header strip -->
    <rect x="0" y="0" width="100" height="22" fill="white" fill-opacity="0.22"/>

    <!-- Calendar: binding rings (3 rings at header bottom edge) -->
    <circle cx="26" cy="22" r="5"   fill="#C2410C"/>
    <circle cx="50" cy="22" r="5"   fill="#C2410C"/>
    <circle cx="74" cy="22" r="5"   fill="#C2410C"/>
    <circle cx="26" cy="22" r="3"   fill="white" fill-opacity="0.18"/>
    <circle cx="50" cy="22" r="3"   fill="white" fill-opacity="0.18"/>
    <circle cx="74" cy="22" r="3"   fill="white" fill-opacity="0.18"/>

    <!-- Calendar: weekday header row (7 cells) -->
    <rect x="7"    y="30" width="10" height="5" rx="1.5" fill="white" fill-opacity="0.30"/>
    <rect x="19.5" y="30" width="10" height="5" rx="1.5" fill="white" fill-opacity="0.30"/>
    <rect x="32"   y="30" width="10" height="5" rx="1.5" fill="white" fill-opacity="0.30"/>
    <rect x="44.5" y="30" width="10" height="5" rx="1.5" fill="white" fill-opacity="0.30"/>
    <rect x="57"   y="30" width="10" height="5" rx="1.5" fill="white" fill-opacity="0.30"/>
    <rect x="69.5" y="30" width="10" height="5" rx="1.5" fill="white" fill-opacity="0.30"/>
    <rect x="82"   y="30" width="10" height="5" rx="1.5" fill="white" fill-opacity="0.30"/>

    <!-- Calendar: date cells row 1 (all 7) -->
    <rect x="7"    y="37" width="10" height="7" rx="2" fill="white" fill-opacity="0.22"/>
    <rect x="19.5" y="37" width="10" height="7" rx="2" fill="white" fill-opacity="0.22"/>
    <rect x="32"   y="37" width="10" height="7" rx="2" fill="white" fill-opacity="0.22"/>
    <rect x="44.5" y="37" width="10" height="7" rx="2" fill="white" fill-opacity="0.22"/>
    <rect x="57"   y="37" width="10" height="7" rx="2" fill="white" fill-opacity="0.22"/>
    <rect x="69.5" y="37" width="10" height="7" rx="2" fill="white" fill-opacity="0.22"/>
    <rect x="82"   y="37" width="10" height="7" rx="2" fill="white" fill-opacity="0.22"/>

    <!-- Calendar: date cells row 2 (sides only — mic covers center) -->
    <rect x="7"    y="46" width="10" height="7" rx="2" fill="white" fill-opacity="0.17"/>
    <rect x="19.5" y="46" width="10" height="7" rx="2" fill="white" fill-opacity="0.17"/>
    <rect x="82"   y="46" width="10" height="7" rx="2" fill="white" fill-opacity="0.17"/>

    <!-- Calendar: date cells row 3 (far sides only) -->
    <rect x="7"    y="55" width="10" height="7" rx="2" fill="white" fill-opacity="0.13"/>
    <rect x="82"   y="55" width="10" height="7" rx="2" fill="white" fill-opacity="0.13"/>

    <!-- Calendar: date cells row 4 -->
    <rect x="7"    y="64" width="10" height="7" rx="2" fill="white" fill-opacity="0.09"/>
    <rect x="82"   y="64" width="10" height="7" rx="2" fill="white" fill-opacity="0.09"/>

    <!-- ===== SANPACHI MICROPHONE (white silhouette) ===== -->

    <!-- Head: rectangular grille body -->
    <rect x="33" y="20" width="34" height="22" rx="4" fill="white"/>
    <!-- Mesh grid lines (horizontal) -->
    <line x1="33" y1="25.5" x2="67" y2="25.5" stroke="#EA580C" stroke-width="1" stroke-opacity="0.22"/>
    <line x1="33" y1="31"   x2="67" y2="31"   stroke="#EA580C" stroke-width="1" stroke-opacity="0.22"/>
    <line x1="33" y1="36.5" x2="67" y2="36.5" stroke="#EA580C" stroke-width="1" stroke-opacity="0.22"/>
    <!-- Mesh grid lines (vertical) -->
    <line x1="40" y1="20" x2="40" y2="42" stroke="#EA580C" stroke-width="1" stroke-opacity="0.22"/>
    <line x1="47" y1="20" x2="47" y2="42" stroke="#EA580C" stroke-width="1" stroke-opacity="0.22"/>
    <line x1="53" y1="20" x2="53" y2="42" stroke="#EA580C" stroke-width="1" stroke-opacity="0.22"/>
    <line x1="60" y1="20" x2="60" y2="42" stroke="#EA580C" stroke-width="1" stroke-opacity="0.22"/>

    <!-- Head clamp / bracket (wider band below head) -->
    <rect x="29" y="38" width="42" height="7" rx="3.5" fill="white"/>

    <!-- Neck connector (short, transitions to stem) -->
    <rect x="44" y="45" width="12" height="5" rx="2.5" fill="white"/>

    <!-- Stem (thin vertical rod) -->
    <rect x="47" y="50" width="6" height="23" rx="3" fill="white"/>

    <!-- Height adjuster knob (mid-stem) -->
    <rect x="41" y="59" width="18" height="7" rx="3.5" fill="white"/>

    <!-- Base disc (wide flat oval) -->
    <ellipse cx="50" cy="79" rx="24" ry="7" fill="white"/>
  </g>
</svg>
