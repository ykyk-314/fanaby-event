  <rect x="3" y="10" width="26" height="12" rx="2" fill="white" opacity="0.95"/>
  <!-- 左ノッチ -->
  <circle cx="3" cy="16" r="3.5" fill="#e84424"/>
  <!-- 右ノッチ -->
  <circle cx="29" cy="16" r="3.5" fill="#e84424"/>
  <!-- ミシン目 -->
