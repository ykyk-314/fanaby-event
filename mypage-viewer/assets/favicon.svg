  <!-- テキスト行（リスト） -->
  <rect x="13" y="13" width="12" height="1.8" rx="0.9" fill="#e84424" opacity="0.8"/>
  <rect x="13" y="16.5" width="9" height="1.8" rx="0.9" fill="#e84424" opacity="0.8"/>
  <rect x="13" y="20" width="7" height="1.8" rx="0.9" fill="#e84424" opacity="0.6"/>
