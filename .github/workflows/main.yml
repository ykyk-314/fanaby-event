name: scrape-and-deploy

on:
  schedule:
    # JST 9:03 / 17:03 / 22:03 に実行（UTC 0:00 / 8:00 / 13:00）
    # - cron: "3 0,8,13 * * *"
    - cron: "3 0,8 * * *"
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'スクレイピングをスキップしてHTMLのみ再生成・デプロイ'
        type: boolean
        default: false

permissions:
  contents: write
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        if: ${{ !inputs.skip_scrape }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        if: ${{ !inputs.skip_scrape }}
        run: pip install -r requirements.txt

      - name: Diagnose API access
        if: ${{ !inputs.skip_scrape }}
        env:
          REMIND_API_URL:          ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET:       ${{ secrets.REMIND_API_SECRET }}
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          echo "=== Bearer のみ ==="
          curl -s -o /tmp/r1.txt -w "status=%{http_code} content_type=%{content_type}\n" \
            -H "Authorization: Bearer $REMIND_API_SECRET" \
            "$REMIND_API_URL/api/talents"
          echo "body(先頭300文字):"; head -c 300 /tmp/r1.txt; echo
          echo ""
          echo "=== Bearer + CF Access サービストークン ==="
          curl -s -o /tmp/r2.txt -w "status=%{http_code} content_type=%{content_type}\n" \
            -H "Authorization: Bearer $REMIND_API_SECRET" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            "$REMIND_API_URL/api/talents"
          echo "body(先頭300文字):"; head -c 300 /tmp/r2.txt; echo

      - name: Scrape profile pages
        if: ${{ !inputs.skip_scrape }}
        env:
          REMIND_API_URL:          ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET:       ${{ secrets.REMIND_API_SECRET }}
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: python scripts/scrape_profile_api.py

      - name: Scrape theater pages
        if: ${{ !inputs.skip_scrape }}
        env:
          REMIND_API_URL:          ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET:       ${{ secrets.REMIND_API_SECRET }}
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: python scripts/scrape_theater_api.py

      - name: Merge and detect diffs
        if: ${{ !inputs.skip_scrape }}
        env:
          REMIND_API_URL:          ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET:       ${{ secrets.REMIND_API_SECRET }}
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: python scripts/merge.py

      - name: Send notifications
        if: ${{ !inputs.skip_scrape }}
        env:
          MAIL_USER:               ${{ secrets.MAIL_USER }}
          MAIL_PASS:               ${{ secrets.MAIL_PASS }}
          MAIL_TO:                 ${{ secrets.MAIL_TO }}
          REMIND_API_URL:          ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET:       ${{ secrets.REMIND_API_SECRET }}
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: python scripts/notify.py

      - name: Build static site
        env:
          REMIND_API_URL:          ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET:       ${{ secrets.REMIND_API_SECRET }}
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: python scripts/build.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json docs/index.html docs/fliers/ docs/talents/
          git diff --cached --quiet || git commit -m "chore: update events [skip ci]"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fanaby-event
          directory: docs
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
