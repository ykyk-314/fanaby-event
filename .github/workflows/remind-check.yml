name: remind-check

on:
  schedule:
    # JST 8:45〜22:45 の間、1時間ごとに実行
    - cron: "45 23 * * *"  # UTC 23:45 = JST 8:45
    - cron: "45 5,13 * * *" # UTC 0:45〜13:45 = JST 9:45〜22:45
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv

      - name: Scrape ticket deadlines
        env:
          REMIND_API_URL:    ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET: ${{ secrets.REMIND_API_SECRET }}
        run: python scripts/scrape_ticket.py

      - name: Commit ticket_deadlines.json if updated
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ticket_deadlines.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update ticket deadlines [skip ci]"
          git push

      - name: Send reminders
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
        run: python scripts/remind.py
