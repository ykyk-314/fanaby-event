<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>設定 — 公演スケジュール</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .settings-section {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .settings-section h2 {
      font-size: 15px;
      font-weight: bold;
      color: #1a1a2e;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid #f0f0f0;
    }
    .talent-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .talent-row:last-child { border-bottom: none; }
    .talent-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      background: #e0e0e8;
      flex-shrink: 0;
    }
    .talent-avatar-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #3d3d5c;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .talent-name {
      flex: 1;
      font-size: 14px;
      font-weight: bold;
      color: #333;
    }
    .talent-name-pending {
      font-size: 12px;
      color: #999;
      font-weight: normal;
    }
    .btn-unfollow {
      padding: 5px 14px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      color: #666;
      flex-shrink: 0;
    }
    .btn-unfollow:hover { background: #f5f5f5; }
    .btn-follow {
      padding: 5px 14px;
      font-size: 13px;
      border: 1px solid #1a1a2e;
      border-radius: 4px;
      background: #1a1a2e;
      cursor: pointer;
      color: #fff;
      flex-shrink: 0;
    }
    .btn-follow:hover { opacity: 0.85; }
    .btn-follow:disabled,
    .btn-unfollow:disabled { opacity: 0.5; cursor: default; }
    .empty-msg {
      font-size: 13px;
      color: #999;
      padding: 8px 0;
    }
    .add-form {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .add-form input[type="text"] {
      flex: 1;
      min-width: 200px;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .btn-add {
      padding: 8px 18px;
      font-size: 13px;
      border: none;
      border-radius: 4px;
      background: #1a1a2e;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-add:hover { opacity: 0.85; }
    .btn-add:disabled { opacity: 0.5; cursor: default; }
    .add-hint {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }
    .status-msg {
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 4px;
      margin-top: 10px;
      display: none;
    }
    .status-msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .status-msg.error   { background: #fce4e4; color: #c62828; display: block; }
    .status-msg.info    { background: #e3f2fd; color: #1565c0; display: block; }
    .loading-overlay {
      text-align: center;
      padding: 24px;
      color: #999;
      font-size: 13px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      font-size: 13px;
      color: #666;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>設定</h1>
      </div>
      <div id="userAvatar" class="user-avatar" style="display:none" title=""></div>
    </div>
  </header>

  <div class="container">
    <a href="index.html" class="back-link">← 公演スケジュールへ戻る</a>

    <!-- フォロー中の芸人 -->
    <div class="settings-section">
      <h2>フォロー中の芸人</h2>
      <div id="followedList">
        <div class="loading-overlay">読み込み中...</div>
      </div>
    </div>

    <!-- マスタから追加 -->
    <div class="settings-section">
      <h2>芸人を追加</h2>
      <div id="masterList">
        <div class="loading-overlay">読み込み中...</div>
      </div>
    </div>

    <!-- 新規追加（マスタへ） -->
    <div class="settings-section">
      <h2>新規芸人を登録</h2>
      <p style="font-size:13px;color:#666;margin-bottom:12px;">
        よしもとプロフィールページの URL を入力してください。
        芸人名と画像は次回の定期更新（最大9時間後）で反映されます。
      </p>
      <div class="add-form">
        <input type="text" id="addUrl" placeholder="https://profile.yoshimoto.co.jp/talent/detail?id=10708">
        <button class="btn-add" id="addBtn" onclick="handleAddToMaster()">登録して追加</button>
      </div>
      <div class="add-hint">
        <a href="https://profile.yoshimoto.co.jp/" target="_blank" rel="noopener">profile.yoshimoto.co.jp</a> で芸人を検索し、プロフィールページの URL を貼り付けてください。
      </div>
      <div class="status-msg" id="addMsg"></div>
    </div>
  </div>

  <script src="assets/settings.js"></script>
</body>
</html>
