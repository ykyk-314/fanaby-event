name: talent-added

on:
  repository_dispatch:
    types: [talent-added]

permissions:
  contents: write
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests python-dotenv

      - name: Scrape profile pages
        env:
          REMIND_API_URL:          ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET:       ${{ secrets.REMIND_API_SECRET }}
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: python scripts/scrape_profile_api.py

      - name: Scrape theater pages
        env:
          REMIND_API_URL:          ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET:       ${{ secrets.REMIND_API_SECRET }}
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: python scripts/scrape_theater_api.py

      - name: Merge and detect diffs
        env:
          REMIND_API_URL:          ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET:       ${{ secrets.REMIND_API_SECRET }}
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: python scripts/merge.py

      - name: Send notifications
        env:
          MAIL_USER:               ${{ secrets.MAIL_USER }}
          MAIL_PASS:               ${{ secrets.MAIL_PASS }}
          MAIL_TO:                 ${{ secrets.MAIL_TO }}
          REMIND_API_URL:          ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET:       ${{ secrets.REMIND_API_SECRET }}
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: python scripts/notify.py

      - name: Build static site
        env:
          REMIND_API_URL:          ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET:       ${{ secrets.REMIND_API_SECRET }}
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: python scripts/build.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json docs/index.html docs/fliers/ docs/talents/
          git diff --cached --quiet || git commit -m "chore: update events for new talent [skip ci]"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fanaby-event
          directory: docs
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
