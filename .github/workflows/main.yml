name: scrape-and-deploy

on:
  schedule:
    # JST 9:03 / 17:03 / 22:03 に実行（UTC 0:00 / 8:00 / 13:00）
    # - cron: "3 0,8,13 * * *"
    - cron: "3 0,8 * * *"
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'スクレイピングをスキップしてHTMLのみ再生成・デプロイ'
        type: boolean
        default: false

permissions:
  contents: write
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        if: ${{ !inputs.skip_scrape }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        if: ${{ !inputs.skip_scrape }}
        run: pip install -r requirements.txt

      - name: Scrape profile pages
        if: ${{ !inputs.skip_scrape }}
        run: python scripts/scrape_profile.py

      - name: Scrape theater pages
        if: ${{ !inputs.skip_scrape }}
        run: python scripts/scrape_theater_api.py

      - name: Merge and detect diffs
        if: ${{ !inputs.skip_scrape }}
        env:
          REMIND_API_URL: ${{ secrets.REMIND_API_URL }}
          REMIND_API_SECRET: ${{ secrets.REMIND_API_SECRET }}
        run: python scripts/merge.py

      - name: Send notifications
        if: ${{ !inputs.skip_scrape }}
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
        run: python scripts/notify.py

      - name: Build static site
        run: python scripts/build.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json docs/index.html docs/fliers/
          git diff --cached --quiet || git commit -m "chore: update events [skip ci]"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fanaby-event
          directory: docs
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
